        function renderCards(list) {
            grid.innerHTML = "";
            list.forEach((file, i) => {
                const card = document.createElement("div");
                card.className = "card";
                if (i === currentIndex) card.classList.add("selected");

                const name = file.replace(/^cl/i, "").replace(/-/g, " ");
                card.innerHTML = `<h3>${name || file}</h3>`;
                card.onclick = () => launchGame(file);
                grid.appendChild(card);
            });
        }

        function filterGames() {
            const query = document.getElementById("searchBox").value.toLowerCase().trim();
            filteredFiles = files.filter(f => 
                f.toLowerCase().includes(query) || 
                f.replace(/^cl/i, "").toLowerCase().includes(query)
            );
            currentIndex = 0;
            renderCards(filteredFiles);
        }

        async function launchGame(file) {
            const normalized = file.endsWith('.html') ? file : file + '.html';
            const url = `https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile/UGS-Files/${encodeURIComponent(normalized)}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                let raw = await response.text();

                const baseTag = `<base href="https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile/UGS-Files/">`;
                raw = raw.includes('<head>') 
                    ? raw.replace('<head>', `<head>${baseTag}`) 
                    : baseTag + raw;

                const overlay = document.getElementById("game-overlay");
                const iframe = document.getElementById("game-iframe");
                
                // Minimal clean executor for the iframe
                const executor = `
                    <!DOCTYPE html>
                    <html><head><meta charset="utf-8"><title>404-FILES • ${file}</title>
                    <style>body,html{margin:0;padding:0;height:100%;overflow:hidden;background:#111;}</style>
                    ${baseTag}</head><body>${raw}</body></html>
                `;

                iframe.srcdoc = executor;
                overlay.style.display = "flex";
            } catch(e) {
                alert("ERROR: Could not load file.");
            }
        }

        function closeGame() {
            const overlay = document.getElementById("game-overlay");
            const iframe = document.getElementById("game-iframe");
            overlay.style.display = "none";
            iframe.srcdoc = ""; // clear the game
        }

        // ==================== PASSWORD SYSTEM ====================
        function checkPassword() {
            const input = document.getElementById("pass-input");
            const status = document.getElementById("status");
            
            if (input.value === "1234") {
                status.innerHTML = `<span class="access-granted">ACCESS GRANTED • WELCOME NYX</span>`;
                setTimeout(() => {
                    document.getElementById("login-screen").style.opacity = "0";
                    setTimeout(() => {
                        document.getElementById("login-screen").style.display = "none";
                        document.getElementById("main-screen").style.display = "flex";
                        renderCards(filteredFiles); // initial render
                    }, 600);
                }, 1200);
            } else {
                status.innerHTML = `<span style="color:#ff4444;">ACCESS DENIED • INVALID CODE</span>`;
                input.value = "";
                setTimeout(() => { status.innerHTML = ""; }, 1800);
            }
        }

        // ==================== KEYBOARD NAVIGATION ====================
        document.addEventListener("keydown", e => {
            if (document.getElementById("main-screen").style.display !== "flex") return;

            const cards = grid.querySelectorAll(".card");
            if (cards.length === 0) return;

            if (e.key === "ArrowRight") {
                currentIndex = (currentIndex + 1) % cards.length;
                renderCards(filteredFiles);
                cards[currentIndex].scrollIntoView({ inline: "center", behavior: "smooth" });
            } 
            else if (e.key === "ArrowLeft") {
                currentIndex = (currentIndex - 1 + cards.length) % cards.length;
                renderCards(filteredFiles);
                cards[currentIndex].scrollIntoView({ inline: "center", behavior: "smooth" });
            } 
            else if (e.key === "ArrowDown") {
                currentIndex = Math.min(currentIndex + 4, cards.length - 1); // approximate grid jump
                renderCards(filteredFiles);
                cards[currentIndex].scrollIntoView({ inline: "center", behavior: "smooth" });
            } 
            else if (e.key === "ArrowUp") {
                currentIndex = Math.max(currentIndex - 4, 0);
                renderCards(filteredFiles);
                cards[currentIndex].scrollIntoView({ inline: "center", behavior: "smooth" });
            } 
            else if (e.key === "Enter") {
                const selectedFile = filteredFiles[currentIndex];
                if (selectedFile) launchGame(selectedFile);
            }
        });

        // Allow Enter on password field too
        document.getElementById("pass-input").addEventListener("keypress", e => {
            if (e.key === "Enter") checkPassword();
        });
    </script>
</body>
</html>
